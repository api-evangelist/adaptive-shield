aid: adaptive-shield
name: Adaptive Shield
description: >-
  Adaptive Shield (now CrowdStrike Falcon Shield) is a SaaS Security Posture
  Management (SSPM) platform that continuously monitors, remediates, and
  governs SaaS application security configurations and identity risks. Acquired
  by CrowdStrike, the platform covers 200+ SaaS integrations with over 3,500
  built-in security checks, helping organizations detect misconfigurations,
  manage human and non-human identities, discover shadow applications, and
  maintain compliance across their entire SaaS stack. The REST API (v1) enables
  programmatic access to alerts, user inventory, device inventory, integrations,
  security checks, and compliance data.
url: >-
  https://raw.githubusercontent.com/api-evangelist/adaptive-shield/refs/heads/main/apis.yml
created: '2026-03-27'
modified: '2026-04-19'
specificationVersion: '0.19'
tags:
  - SaaS Security
  - SSPM
  - Security Posture Management
  - Cybersecurity
  - Cloud Security
  - Identity Management
  - Compliance
apis:
  - aid: adaptive-shield:adaptive-shield-api
    name: Adaptive Shield REST API
    description: >-
      The Adaptive Shield REST API v1 provides programmatic access to SaaS
      security posture data including alerts, user and device inventory,
      integration configurations, security check results, violations, and
      compliance controls. Authentication uses a per-user API key (access
      token). Regional endpoints are available for US (api.adaptive-shield.com)
      and EU (eu.api.adaptive-shield.com) regions.
    humanURL: https://www.crowdstrike.com/platform/falcon-shield/
    tags:
      - SaaS Security
      - SSPM
      - REST API
      - Alerts
      - Compliance
    properties:
      - type: Documentation
        url: https://www.crowdstrike.com/platform/falcon-shield/
      - type: Authentication
        url: https://www.adaptive-shield.com/support
